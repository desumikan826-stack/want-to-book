<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shelfio</title>
    <link rel="stylesheet" href="style.css">
</head>

<header>
    <div class="logo">
        📚 Shelfio
    </div>

    <nav>
        <a href="search.html">🔍 検索</a>
        <a href="list.html">📚 本棚</a>
        <a href="settings.html">⚙️ 設定</a>
        <button id="logoutBtn">ログアウト</button>
    </nav>
</header>

<body>
<h2>本を検索</h2>

<select id="searchType">
    <option value="title">タイトル</option>
    <option value="author">著者</option>
    <option value="publisher">出版社</option>
    <option value="isbn">ISBN</option>
</select>

<input
    type="text"
    id="bookSearch"
    placeholder="検索キーワードを入力">

<button type="button" id="searchBtn">検索</button>

<div id="searchResult"></div>

<div class="form">
    <input id="title" placeholder="本のタイトル">
    <input id="author" placeholder="著者">
<div id="rating" class="rating">
    <span onclick="setRating(1)">☆</span>
    <span onclick="setRating(2)">☆</span>
    <span onclick="setRating(3)">☆</span>
    <span onclick="setRating(4)">☆</span>
    <span onclick="setRating(5)">☆</span>
    <label>
    <input type="checkbox" id="purchased">
    購入済み
</label>

<label>
    読書状況
    <select id="status">
        <option value="unread">未読</option>
        <option value="reading">読書中</option>
        <option value="finished">読了済み</option>
    </select>
</label>
</div>
<button onclick="addBook()">登録</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script-v3.js" type="module"></script>

</body>

</html>
