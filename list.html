<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>欲しい本リスト</title>
    <link rel="stylesheet" href="style.css">
</head>

<header>
    <div class="logo">
        📚 欲しい本リスト
    </div>

    <nav>
        <a href="search.html">🔍 検索</a>
        <a href="list.html">📚 本棚</a>
        <a href="settings.html">⚙️ 設定</a>

        <button id="logoutBtn">ログアウト</button>
    </nav>

</header>

<body>
    <!-- list.html の検索バーの上あたりに追加 -->
<div class="tabs">
    <button onclick="switchTab('all')" id="tab-all" class="tab-btn active">すべて</button>
    <button onclick="switchTab('want')" id="tab-want" class="tab-btn">欲しい本</button>
    <button onclick="switchTab('read')" id="tab-read" class="tab-btn">読んだ本</button>
</div>
<!-- もともとある検索バー -->

<div class="search">
    <input type="text" id="search" placeholder="本を検索..." onkeyup="displayBooks()">
</div>

<div class="search">

    <input
        type="text"
        id="search"
        placeholder="本を検索..."
        onkeyup="displayBooks()">

</div>

<div id="bookStats"></div>

<div id="bookList"></div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeSettings()">&times;</span>
        <h2>⚙️ 設定</h2>
        <p>ここに設定項目を追加できます。</p>
        <label>
            <input type="checkbox">
              ダークモード
        </label>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script-v3.js" type="module"></script>

</body>

</html>
