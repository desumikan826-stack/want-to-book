<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Shelfio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>

<header>
    <a class="logo" href="index.html">
        📚 Shelfio
    </a>

    <nav>
        <a href="index.html">🏠 トップへ戻る</a>
        <a href="search.html">🔍 検索</a>
        <a href="list.html">📚 本棚</a>
        <a href="updates.html">🗓 更新</a>
        <button id="logoutBtn">ログアウト</button>
    </nav>

</header>

<body>
    <!-- list.html の検索バーの上あたりに追加 -->

<div class="tabs">
    <button onclick="switchTab('all')" id="tab-all" class="tab-btn active">
        すべて
    </button>

    <button onclick="switchTab('unread')" id="tab-unread" class="tab-btn">
        未読
    </button>

    <button onclick="switchTab('reading')" id="tab-reading" class="tab-btn">
        読書中
    </button>

    <button onclick="switchTab('finished')" id="tab-finished" class="tab-btn">
        読了済み
    </button>
</div>

<!-- もともとある検索バー -->

<div class="search">

    <select id="sortType" onchange="displayBooks()">
        <option value="none">並び替えなし</option>
        <option value="rating">評価順</option>
        <option value="title">タイトル順</option>
    </select>

    <input
        type="text"
        id="search"
        placeholder="本を検索..."
        onkeyup="displayBooks()">

</div>

<div id="bookStats"></div>

<div id="bookList" class="book-list">

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeSettings()">&times;</span>
        <h2>⚙️ 設定</h2>
        <p>ここに設定項目を追加できます。</p>
        <label>
            <input type="checkbox">
            ダークモード
        </label>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script-v3.js" type="module"></script>

</body>

</html>
