

<!DOCTYPE html>
<html lang="ja">
<head>
    
    <meta charset="UTF-8">
    <title>欲しい本リスト</title>

</head>
<body>
<div class="search">

        type="text"
        id="search"

            <input type="checkbox">

        </label>
    </div>
</div>
<script src="script.js"></script>



</body>
</html>
